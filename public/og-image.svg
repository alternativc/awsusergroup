<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f36"/>
      <stop offset="40%" style="stop-color:#1e2444"/>
      <stop offset="100%" style="stop-color:#2a1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e88b2e"/>
      <stop offset="100%" style="stop-color:#e8c840"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c3fc5"/>
      <stop offset="100%" style="stop-color:#a78bca"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#purpleGrad)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#a78bca" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Hexagon decorative -->
  <polygon points="150,100 230,55 310,100 310,190 230,235 150,190" fill="none" stroke="#6c3fc5" stroke-width="1" opacity="0.12"/>
  <polygon points="950,400 1010,365 1070,400 1070,470 1010,505 950,470" fill="none" stroke="#a78bca" stroke-width="0.8" opacity="0.08"/>

  <!-- Plus signs -->
  <text x="180" y="320" font-family="sans-serif" font-size="24" fill="#6c3fc5" opacity="0.2">+</text>
  <text x="1050" y="180" font-family="sans-serif" font-size="18" fill="#e88b2e" opacity="0.2">+</text>
  <text x="100" y="480" font-family="sans-serif" font-size="16" fill="#e8c840" opacity="0.15">+</text>
  <text x="1100" y="520" font-family="sans-serif" font-size="20" fill="#b5547a" opacity="0.15">+</text>

  <!-- Glow -->
  <circle cx="350" cy="315" r="200" fill="#6c3fc5" opacity="0.04"/>

  <!-- Main text -->
  <text x="480" y="240" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="72" fill="#ffffff">AWS User Group</text>
  <text x="480" y="330" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="72" fill="url(#accent)">Ljubljana</text>

  <!-- Subtitle -->
  <text x="480" y="385" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#a78bca">Where cloud builders meet</text>

  <!-- Stats -->
  <text x="480" y="460" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#e88b2e">45+ Talks</text>
  <text x="660" y="460" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#a78bca">7 Sponsors</text>
  <text x="860" y="460" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="22" fill="#e8c840">Monthly Meetups</text>

  <!-- URL -->
  <text x="480" y="540" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="20" fill="#6b7394">www.awsusergroup.net</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
